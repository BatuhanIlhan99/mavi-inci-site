name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate site source
        run: node ./scripts/validate-site.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static bundle
        run: |
          mkdir -p dist
          cp index.html dist/
          cp odalar.html dist/
          cp erdek-rehberi.html dist/
          cp deneyimler.html dist/
          cp rezervasyon.html dist/
          cp admin.html dist/
          cp room.html dist/
          cp tesis.html dist/
          cp panel-mavi-inci.html dist/
          cp panel-gulplaj.html dist/
          cp panel-villa-ece.html dist/
          cp panel-fastfood.html dist/
          cp panel-pub.html dist/
          cp styles.css dist/
          cp han.css dist/
          cp boot.js dist/
          cp han-shell.js dist/
          cp han-app.js dist/
          cp han-data.js dist/
          cp favicon.svg dist/
          cp site.webmanifest dist/
          cp robots.txt dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
