name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static bundle
        run: |
          mkdir -p dist
          cp index.html dist/
          cp room.html dist/
          cp admin.html dist/
          cp styles.css dist/
          cp admin.css dist/
          cp script.js dist/
          cp room-detail.js dist/
          cp admin.js dist/
          cp site-data.js dist/
          cp site-state.override.js dist/
          cp favicon.svg dist/
          cp site.webmanifest dist/
          cp robots.txt dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
